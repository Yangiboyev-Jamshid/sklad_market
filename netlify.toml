[build]
  command = "npm run build"
  publish = "dist"

# Proxy API calls to the real backend — mirrors the vite.config.js dev-server
# proxy, which only applies to `npm run dev` and has no effect on the built
# site. Without this, every relative /api/... fetch 404s on Netlify because
# there's no such path in the static output.
[[redirects]]
  from = "/api/*"
  to = "https://skladmarket.uz/api/:splat"
  status = 200
  force = true

# SPA fallback so client-side routes (e.g. /catalog, /product/123) don't 404
# on a hard refresh or direct link.
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
