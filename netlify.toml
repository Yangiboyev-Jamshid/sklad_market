[build]
  command = "npm run build"
  publish = "dist"

# Proxy API calls to the real backend via an Edge Function (see
# netlify/edge-functions/api-proxy.js) rather than a plain redirect, because
# the backend's CORS filter only accepts Origin: https://skladmarket.uz and
# rejects everything else with 403 — a plain redirect forwards the deployed
# site's own Origin header as-is and gets blocked.
[[edge_functions]]
  path = "/api/*"
  function = "api-proxy"

# SPA fallback so client-side routes (e.g. /catalog, /product/123) don't 404
# on a hard refresh or direct link.
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
